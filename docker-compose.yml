services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: inkwell
      POSTGRES_PASSWORD: inkwell
      POSTGRES_DB: inkwell
    ports:
      - '${INKWELL_DB_PORT:-5432}:5432'
    volumes:
      - inkwell_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U inkwell -d inkwell']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inkwell_pgdata:
